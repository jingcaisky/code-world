
# Production configuration
# with external Nginx (config template provided)
#
# Usage:
#   1. Fill backend/.env with real production secrets (cp backend/.env.example
#      backend/.env if it doesn't exist yet). The same file is used for dev and
#      prod — there is no separate .env.prod.
#   2. Run: make prod   (or: docker compose --env-file backend/.env -f docker-compose.prod.yml up -d)
#
# Prerequisites:
#   1. Configure your external Nginx using nginx/nginx.conf as reference
#   2. Configure backend/.env with DOMAIN

services:

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: multi_agent_backend:dev
    container_name: multi_agent_backend
    volumes:
      - media_data:/app/media
      # email/templates.py reads pre-compiled HTML/text from /app/emails/compiled.
      # Build context is ./backend so the dir isn't in the image — mount it.
      - ./emails:/app/emails:ro
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    networks:
      - backend-internal
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M


  db:
    image: postgres:16-alpine
    container_name: multi_agent_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-multi_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NO external ports - only accessible within backend-internal network
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: multi_agent_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    # NO external ports - only accessible within backend-internal network
    volumes:
      - redis_data:/data
    networks:
      - backend-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  celery_worker:
    image: multi_agent_backend:dev
    volumes:
      - media_data:/app/media
      - ./emails:/app/emails:ro
    command: celery -A app.worker.celery_app worker --loglevel=warning --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=false
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend-internal
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  celery_beat:
    image: multi_agent_backend:dev
    container_name: multi_agent_celery_beat
    command: celery -A app.worker.celery_app beat --loglevel=warning
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=false
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - backend-internal
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  flower:
    image: multi_agent_backend:dev
    container_name: multi_agent_flower
    command: celery -A app.worker.celery_app flower --port=5555
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=false
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    networks:
      - backend-internal
    ports:
      - "5555:5555"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  frontend:
    image: multi_agent_frontend:dev
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        - NEXT_PUBLIC_MAX_UPLOAD_SIZE_MB=50
        - NEXT_PUBLIC_OAUTH_PROVIDERS=google
        - NEXT_PUBLIC_RAG_ENABLED=true
    container_name: multi_agent_frontend
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://app:8000
      - BACKEND_WS_URL=ws://app:8000
    networks:
      - backend-internal
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  backend-internal:
    driver: bridge
    internal: true

volumes:
  media_data:
  postgres_data:
  redis_data:
